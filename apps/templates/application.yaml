{{- range .Values.applications }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .name }}
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_USERNAME/gowtham-apps.git
    targetRevision: main
    path: {{ .name }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .name }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
{{- end }}
